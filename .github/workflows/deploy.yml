name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt/Nitro app
        run: npm run build

      - name: Package files
        run: tar -czf deploy.tar.gz .output package.json package-lock.json public

      - name: Upload to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 22
          source: "deploy.tar.gz"
          target: ${{ secrets.HOSTINGER_TARGET_DIR }}

      - name: Extract on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 22
          script: |
            cd ${{ secrets.HOSTINGER_TARGET_DIR }}
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
